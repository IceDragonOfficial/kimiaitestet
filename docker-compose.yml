# Velixo Platform - Altyapı Servisleri
version: '3.8'

services:
  # PostgreSQL Veritabanı
  postgres:
    image: postgres:16-alpine
    container_name: velixo_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: velixo
      POSTGRES_PASSWORD: velixo_secret_2026
      POSTGRES_DB: velixo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velixo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: velixo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass velixo_redis_2026 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "velixo_redis_2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3 Uyumlu Dosya Depolama)
  minio:
    image: minio/minio:latest
    container_name: velixo_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: velixo_minio
      MINIO_ROOT_PASSWORD: velixo_minio_2026
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit (Geliştirme E-posta Sunucusu)
  mailpit:
    image: axllent/mailpit:latest
    container_name: velixo_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  redis_data:
  minio_data:
